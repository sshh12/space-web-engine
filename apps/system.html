<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="data:,">
<title>Sol — Space Web Engine</title>
<style>
  :root{color-scheme:dark;--ink:#eef3ff;--muted:#8995ad;--line:#ffffff1c;--glass:#09101bcc;--blue:#8dbdff}
  *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#010208;color:var(--ink);font:13px/1.45 Inter,ui-sans-serif,system-ui,sans-serif}
  #c{display:block;width:100vw;height:100vh;cursor:grab}#c:active{cursor:grabbing}
  #top{position:fixed;inset:0 0 auto 0;height:58px;display:flex;align-items:center;gap:22px;padding:0 22px;background:linear-gradient(#030711e8,#03071188 72%,transparent);pointer-events:none}
  #brand{font-size:15px;font-weight:650;letter-spacing:.08em;text-transform:uppercase}#brand i{font-style:normal;color:var(--blue)}
  #crumb{color:var(--muted);font-variant-numeric:tabular-nums}#top .spacer{flex:1}
  button,select,input{font:inherit;color:inherit}button,select{border:1px solid var(--line);background:#131d2cdd;border-radius:7px;padding:7px 10px;pointer-events:auto}button{cursor:pointer}button:hover{border-color:#8dbdff88;background:#1a2940}
  #panel{position:fixed;top:72px;left:16px;width:280px;max-height:calc(100vh - 104px);display:flex;flex-direction:column;background:var(--glass);border:1px solid var(--line);border-radius:13px;box-shadow:0 18px 60px #0008;backdrop-filter:blur(14px);overflow:hidden}
  .head{padding:14px 15px 10px;border-bottom:1px solid var(--line)}.eyebrow{color:var(--blue);font-size:10px;text-transform:uppercase;letter-spacing:.14em}.head h1{font-size:20px;margin:2px 0 3px}.sub{color:var(--muted);font-size:11px}
  #search{width:calc(100% - 24px);margin:12px;padding:8px 10px;background:#030711aa;border:1px solid var(--line);border-radius:7px;outline:none}#search:focus{border-color:#8dbdffaa}
  #bodies{overflow:auto;padding:0 8px 12px}.body{width:100%;display:grid;grid-template-columns:10px 1fr auto;align-items:center;gap:9px;border:0;background:transparent;padding:8px;text-align:left}.body:hover{background:#ffffff0a}.dot{width:7px;height:7px;border-radius:50%;background:var(--dot);box-shadow:0 0 8px var(--dot)}.body small{color:var(--muted)}
  #controls{position:fixed;right:16px;top:72px;width:224px;padding:13px 14px;background:var(--glass);border:1px solid var(--line);border-radius:13px;backdrop-filter:blur(14px)}
  #controls label{display:grid;grid-template-columns:62px 1fr;align-items:center;gap:8px;margin:8px 0;color:var(--muted)}#controls select{width:100%;padding:5px 7px}
  #controls input[type=range]{width:100%;accent-color:var(--blue);pointer-events:auto}
  #warp-label{grid-column:1 / -1;text-align:center;color:var(--ink);font-variant-numeric:tabular-nums;font-size:12px;margin-top:-3px}
  #extrap{display:none;color:#e8c47a;font-size:10px;letter-spacing:.06em;text-transform:uppercase}
  #now-btn{padding:4px 8px;font-size:11px}
  #system-btn{width:100%;margin-top:7px}.rule{height:1px;background:var(--line);margin:11px 0}.readout{font-variant-numeric:tabular-nums;color:var(--ink)}
  #markers{position:fixed;inset:0;pointer-events:none}.marker{position:absolute;width:8px;height:8px;margin:-4px;border:1px solid #dce8ff;border-radius:50%;box-shadow:0 0 8px #8dbdffaa;opacity:.84;pointer-events:none}.marker.major::after{content:attr(data-name);position:absolute;left:10px;top:-8px;color:#c8d3e8;font-size:10px;text-shadow:0 1px 4px #000;white-space:nowrap}.marker.moon{width:5px;height:5px;margin:-2.5px;opacity:.48}
  .marker.label-hidden::after{display:none}
  #tooltip{position:fixed;display:none;z-index:4;padding:5px 8px;border:1px solid var(--line);border-radius:6px;background:#050a13e8;pointer-events:none}
  #status{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);padding:7px 12px;border:1px solid var(--line);border-radius:20px;background:#050a13bb;color:var(--muted);font-size:11px;backdrop-filter:blur(8px)}
  #err{position:fixed;inset:50% auto auto 50%;transform:translate(-50%,-50%);display:none;max-width:70ch;background:#240b12ee;color:#ffb4bd;border:1px solid #ff708055;border-radius:10px;padding:16px;white-space:pre-wrap;z-index:10}
  /* Phase E editor: modest UI over a rigorous mutation path */
  #edit-btn{width:100%;margin-top:7px}
  #editor{position:fixed;right:16px;top:72px;bottom:16px;width:300px;display:none;flex-direction:column;background:var(--glass);border:1px solid var(--line);border-radius:13px;backdrop-filter:blur(14px);overflow:hidden;z-index:5}
  #editor.open{display:flex}
  #editor .head{display:flex;align-items:center;gap:8px}#editor .head h2{font-size:14px;margin:0;flex:1}
  #ed-tree{overflow:auto;max-height:32%;border-bottom:1px solid var(--line);padding:6px 8px}
  #ed-tree button{display:block;width:100%;text-align:left;border:0;background:transparent;padding:3px 6px;border-radius:5px;color:var(--ink);font-size:12px}
  #ed-tree button:hover{background:#ffffff0d}#ed-tree button.sel{background:#8dbdff22;color:var(--blue)}
  #ed-tree button.moon{padding-left:20px;color:var(--muted)}
  #ed-form{flex:1;overflow:auto;padding:10px 12px}
  #ed-form h3{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--blue);margin:12px 0 4px}
  #ed-form label{display:grid;grid-template-columns:88px 1fr;gap:6px;align-items:center;margin:3px 0;color:var(--muted);font-size:11px}
  #ed-form input[type=number],#ed-form input[type=text]{width:100%;padding:3px 6px;background:#030711aa;border:1px solid var(--line);border-radius:5px;outline:none;font-size:11px}
  #ed-form input[type=color]{width:100%;height:22px;padding:0;border:1px solid var(--line);border-radius:5px;background:transparent}
  #ed-form .proc{display:grid;grid-template-columns:auto 1fr 70px;gap:6px;align-items:center;margin:2px 0;font-size:11px;color:var(--muted)}
  #ed-actions{padding:9px 12px;border-top:1px solid var(--line);display:grid;grid-template-columns:1fr 1fr;gap:6px}
  #ed-actions button,#ed-form button{padding:5px 8px;font-size:11px}
  #ed-msg{padding:6px 12px;font-size:11px;color:#ffb4bd;white-space:pre-wrap;max-height:90px;overflow:auto}
  #ed-msg.ok{color:#9fe8b0}
  @media(max-width:760px){#panel{width:220px}#controls{top:auto;bottom:16px;width:200px}.marker.major::after{display:none}}
</style>
</head>
<body>
<canvas id="c" aria-label="True-scale navigable Sol system"></canvas>
<div id="markers"></div><div id="tooltip"></div>
<header id="top"><div id="brand">Space <i>Web</i> Engine</div><div id="crumb">SOL / SYSTEM VIEW</div><div class="spacer"></div></header>
<aside id="panel"><div class="head"><div class="eyebrow">Navigable system</div><h1>Sol</h1><div class="sub">True scale. Orbit lines and markers provide findability; bodies are never enlarged.</div></div><input id="search" placeholder="Find a world…" autocomplete="off"><div id="bodies"></div></aside>
<aside id="controls"><div class="eyebrow">Clock & camera</div>
<label>Warp <input id="warp" type="range" min="-7" max="7" step="1" value="4" aria-label="Time warp detent"><span id="warp-label">86,400× · day/s</span></label>
<label>Scrub <input id="scrub" type="range" min="-1000" max="1000" step="1" value="0" aria-label="Epoch scrub"></label>
<label>Epoch <span class="readout" id="epoch">Y+0 · D000 · 00:00</span></label>
<label><span id="extrap">extrapolated</span> <button id="now-btn" style="justify-self:end">Now</button></label>
<div class="rule"></div><button id="system-btn">Return to system</button><button id="edit-btn">Edit system…</button><div class="sub" style="margin-top:9px">Drag to orbit · wheel to zoom<br>Click a marker to travel · hold Shift for 4×</div></aside>
<aside id="editor">
  <div class="head" style="padding:12px 14px;border-bottom:1px solid var(--line)">
    <h2>System editor</h2><span class="sub" id="ed-hash"></span><button id="ed-close" style="padding:2px 8px">×</button>
  </div>
  <div id="ed-tree"></div>
  <div id="ed-form"></div>
  <div id="ed-msg"></div>
  <div id="ed-actions">
    <button id="ed-add">Add from template…</button><button id="ed-clone">Clone selected</button>
    <button id="ed-reseed">Reseed selected</button><button id="ed-delete">Delete selected</button>
    <button id="ed-export">Export JSON</button><button id="ed-import">Import JSON</button>
  </div>
  <input id="ed-file" type="file" accept="application/json" hidden>
</aside>
<div id="status">Loading the system…</div><div id="hud" hidden></div><div id="err"></div>
<script>window.__pageErrors=[];const fail=e=>{const m=String(e.reason?.stack||e.reason||e.message||e);document.querySelector('#err').style.display='block';document.querySelector('#err').textContent=m;window.__pageErrors.push(m)};addEventListener('error',fail);addEventListener('unhandledrejection',fail);</script>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
<script type="module" src="../src/system-app.js"></script>
</body>
</html>
