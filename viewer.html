<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>image → procedural 3D terrain</title>
<!--
  Standalone viewer: an albedo image + a grayscale height map -> a displaced 3D
  terrain. Height is baked into the geometry on the CPU (computeVertexNormals), so
  lighting responds to real relief. No build step; Three.js from a CDN.

  Textures (override via URL):  ?albedo=assets/sample_albedo.png&height=assets/sample_height.png
  Must be SERVED over http(s) (textures won't load from file://):
      python -m http.server 8000   ->   http://localhost:8000/viewer.html

  Make a matching height map with imagegen.py (edit, so it stays pixel-aligned):
      python imagegen.py edit -i assets/sample_albedo.png \
        --prompt "smooth grayscale topographic height map / DEM of this surface, \
                  black=lowest white=highest, no shading, no fine noise" \
        -o assets/sample_height.png
-->
<style>
  html,body{margin:0;height:100%;background:#0b0b0e;overflow:hidden;font:13px/1.4 system-ui,sans-serif;color:#e8e8ea}
  #c{display:block;width:100vw;height:100vh}
  #ui{position:fixed;top:12px;left:12px;background:#181820cc;backdrop-filter:blur(6px);border:1px solid #ffffff22;border-radius:10px;padding:12px 14px;min-width:240px}
  #ui h1{margin:0 0 4px;font-size:13px;font-weight:600}
  #ui .sub{opacity:.55;font-size:11px;margin-bottom:8px}
  #ui label{display:flex;justify-content:space-between;gap:10px;align-items:center;margin:7px 0}
  #ui input[type=range]{flex:1}
  #ui .val{opacity:.75;min-width:46px;text-align:right;font-variant-numeric:tabular-nums}
  #ui .row{display:flex;gap:8px;margin-top:10px}
  #ui button{flex:1;background:#2a2a3a;color:#e8e8ea;border:1px solid #ffffff22;border-radius:7px;padding:6px;cursor:pointer}
  #ui button:hover{background:#39394f}
  #hint{position:fixed;bottom:12px;left:12px;opacity:.5;font-size:11px}
  #err{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#ff9b9b;max-width:60ch;text-align:center}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <h1>image → procedural terrain</h1>
  <div class="sub">albedo + height map → displaced 3D</div>
  <label>Height <input id="hgt" type="range" min="0" max="2.5" step="0.01" value="0.6"><span class="val" id="hgtv"></span></label>
  <label>Smooth <input id="blur" type="range" min="0" max="12" step="1" value="3"><span class="val" id="blurv"></span></label>
  <label>Tiling <input id="rep" type="range" min="1" max="6" step="1" value="1"><span class="val" id="repv"></span></label>
  <label>Sun°   <input id="sun" type="range" min="3" max="85" step="1" value="30"><span class="val" id="sunv"></span></label>
  <label>Detail <input id="seg" type="range" min="128" max="1024" step="64" value="640"><span class="val" id="segv"></span></label>
  <div class="row"><button id="wire">wireframe</button><button id="layer">show heightmap</button></div>
</div>
<div id="hint">drag = orbit · scroll = zoom · right-drag = pan</div>
<div id="err" style="display:none"></div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const q = new URL(location.href).searchParams;
const ALBEDO = q.get('albedo') || 'assets/sample_albedo.png';
const HEIGHT = q.get('height') || 'assets/sample_height.png';
const PLANE  = 10;   // world size of the terrain (square)

const $ = id => document.getElementById(id);
const showErr = m => { const e=$('err'); e.style.display='block'; e.textContent=m; };

const canvas = $('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.05;

const scene = new THREE.Scene();
scene.background = (()=>{ const c=document.createElement('canvas'); c.width=c.height=64; const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,0,64); g.addColorStop(0,'#9aa3b2'); g.addColorStop(.5,'#5a6070'); g.addColorStop(1,'#23262e');
  x.fillStyle=g; x.fillRect(0,0,64,64); const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t; })();

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.01, 1000);
camera.position.set(PLANE*0.55, PLANE*0.42, PLANE*0.7);
const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true; controls.maxPolarAngle = Math.PI*0.495;

const hemi = new THREE.HemisphereLight(0xeaeaf0, 0x202024, 0.85); scene.add(hemi);
const sun  = new THREE.DirectionalLight(0xfff3e6, 2.4); scene.add(sun);
scene.add(new THREE.AmbientLight(0xffffff, 0.22));

const loader = new THREE.TextureLoader();
const load = u => new Promise((res,rej)=>loader.load(u,res,undefined,()=>rej(new Error('failed to load '+u))));
let albedoTex, heightTex, rawHeight, heightData, W, H, mesh, material, wire=false, layer=false;

function readHeight(img){
  const cv=document.createElement('canvas'); cv.width=img.width; cv.height=img.height;
  const cx=cv.getContext('2d'); cx.drawImage(img,0,0); const d=cx.getImageData(0,0,img.width,img.height).data;
  W=img.width; H=img.height; rawHeight=new Float32Array(W*H);
  for(let i=0,j=0;i<d.length;i+=4,j++) rawHeight[j]=(d[i]+d[i+1]+d[i+2])/765;  // 0..1 luminance
  applyBlur();
}
// separable wrapping box blur: macro relief displaces, per-pixel grain (which would
// otherwise become spikes) is left to the lighting/normal detail.
function applyBlur(){
  const r=+$('blur').value;
  if(r<=0){ heightData=rawHeight.slice(); return; }
  const tmp=new Float32Array(W*H), out=new Float32Array(W*H), n=2*r+1;
  for(let y=0;y<H;y++){ let s=0; for(let k=-r;k<=r;k++) s+=rawHeight[y*W+((k%W)+W)%W];
    for(let x=0;x<W;x++){ tmp[y*W+x]=s/n; s+=rawHeight[y*W+((x+r+1)%W)]-rawHeight[y*W+(((x-r)%W)+W)%W]; } }
  for(let x=0;x<W;x++){ let s=0; for(let k=-r;k<=r;k++) s+=tmp[(((k%H)+H)%H)*W+x];
    for(let y=0;y<H;y++){ out[y*W+x]=s/n; s+=tmp[((y+r+1)%H)*W+x]-tmp[((((y-r)%H)+H)%H)*W+x]; } }
  heightData=out;
}
function sampleH(u,v){ u=((u%1)+1)%1; v=((v%1)+1)%1;
  const x=u*(W-1), y=(1-v)*(H-1);   // (1-v): match Three.js texture flipY so relief aligns with the albedo
  const x0=x|0,y0=y|0,x1=Math.min(x0+1,W-1),y1=Math.min(y0+1,H-1),fx=x-x0,fy=y-y0;
  const a=heightData[y0*W+x0],b=heightData[y0*W+x1],c=heightData[y1*W+x0],e=heightData[y1*W+x1];
  return (a*(1-fx)+b*fx)*(1-fy)+(c*(1-fx)+e*fx)*fy;
}
function buildMesh(){
  const seg=+$('seg').value, rep=+$('rep').value, hgt=+$('hgt').value;
  if(mesh){ scene.remove(mesh); mesh.geometry.dispose(); }
  const geo=new THREE.PlaneGeometry(PLANE,PLANE,seg,seg); geo.rotateX(-Math.PI/2);
  const pos=geo.attributes.position, uv=geo.attributes.uv;
  for(let i=0;i<pos.count;i++) pos.setY(i,(sampleH(uv.getX(i)*rep, uv.getY(i)*rep)-0.5)*hgt);
  for(let i=0;i<uv.count;i++) uv.setXY(i, uv.getX(i)*rep, uv.getY(i)*rep);
  geo.computeVertexNormals();
  albedoTex.repeat.set(rep,rep); if(heightTex) heightTex.repeat.set(rep,rep);
  mesh=new THREE.Mesh(geo,material); mesh.material.wireframe=wire; scene.add(mesh);
}
function setSun(){ const a=+$('sun').value*Math.PI/180; sun.position.set(Math.cos(a)*PLANE,Math.sin(a)*PLANE,Math.cos(a)*PLANE*0.3); }

async function init(){
  try { albedoTex=await load(ALBEDO); } catch(e){ showErr(e.message+'  (serve over http and check the path)'); return; }
  try { heightTex=await load(HEIGHT); } catch(e){ showErr('height map: '+e.message); return; }
  albedoTex.colorSpace=THREE.SRGBColorSpace; albedoTex.wrapS=albedoTex.wrapT=THREE.RepeatWrapping;
  heightTex.colorSpace=THREE.SRGBColorSpace; heightTex.wrapS=heightTex.wrapT=THREE.RepeatWrapping;
  readHeight(heightTex.image);
  material=new THREE.MeshStandardMaterial({ map:albedoTex, roughness:0.95, metalness:0 });
  buildMesh(); setSun();
  const sync=()=>{ for(const id of ['hgt','blur','rep','sun','seg']) $(id+'v').textContent=$(id).value; }; sync();
  for(const id of ['hgt','rep','seg']) $(id).oninput=()=>{ sync(); buildMesh(); };
  $('blur').oninput=()=>{ sync(); applyBlur(); buildMesh(); };
  $('sun').oninput=()=>{ sync(); setSun(); };
  $('wire').onclick=()=>{ wire=!wire; if(mesh) mesh.material.wireframe=wire; };
  $('layer').onclick=()=>{ layer=!layer; material.map=layer?heightTex:albedoTex; material.needsUpdate=true;
    $('layer').textContent=layer?'show albedo':'show heightmap'; };
}

// headless hooks for screenshot.mjs
window.__shot=(az,el,d)=>{ const ar=az*Math.PI/180,er=el*Math.PI/180;
  camera.position.set(Math.cos(ar)*Math.cos(er)*d, Math.sin(er)*d, Math.sin(ar)*Math.cos(er)*d);
  controls.target.set(0,0,0); camera.lookAt(0,0,0); controls.update(); renderer.render(scene,camera); };
window.__ready=()=>!!mesh;

addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
(function loop(){ requestAnimationFrame(loop); controls.update(); renderer.render(scene,camera); })();
init();
</script>
</body>
</html>
